name: print github objects
description: This workflow prints GitHub objects for debugging purposes.
on:
  workflow_dispatch:
  pull_request:
  push:
jobs:
    print:
        name: print
        runs-on: ubuntu-latest
        steps:
        - run: echo "workflow called"
        - run: |
            echo "triggered by event: ${{ github.event_name }}"
        - run: |
            echo "github object: ${{ toJson(github) }}"
