name: Validate & Publish DevContainer
description: This workflow is checking that for releases, updates do not break stuff and publishes the released container.
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  release:
    types: [published]
jobs:
  build:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - run: echo "workflow called"
      - run: |
          echo "triggered by event: ${{ github.event_name }}"
      - run: |
          echo "github object: ${{ toJson(github) }}"
      - run: |
          echo "tag name: ${{ toJson(github.event.release.tag_name) }}"
